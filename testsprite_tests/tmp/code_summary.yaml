version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js (App Router)
  - React (SPA Pattern)
  - TailwindCSS
  - shadcn/ui
  - Framer Motion
  - Lucide Icons
routes:
  - path: /
    file: app/page.tsx
    auth_required: false
    description: "Main Application (SPA). Contains screens Home (Inici), Legends (Explorar), Map (Mapa), Profile (Perfil)."
  - path: /admin
    file: app/admin/page.tsx
    auth_required: false
    description: "Admin dashboard protected by Master Password gate."
features:
  - name: App Navigation (SPA)
    description: "The main app switches screens via a Bottom Navigation bar with icons without full page reloads."
    files:
      - components/BottomNavigation.tsx
    entry_route: /
    user_interactions:
      - "Navigate using buttons with labels: 'Inici', 'Explorar', 'Mapa', 'Perfil'"
      - "Wait for SplashScreen (~800ms) before interacting"
  - name: Admin Dashboard Gateway
    description: "Accessing administrative tools using master password 'mistic_master_audit'."
    files:
      - components/admin/AdminSecurityGate.tsx
    entry_route: /admin
    user_interactions:
      - "Enter password 'mistic_master_audit' to unlock for testing"
      - "Click 'Accedir' (data-testid='admin-gate-submit')"
    auth_required: false
  - name: User Passport & Gamification
    description: "View unlocked stamps and player level. Note labels: 'Stamps' is used for tokens."
    files:
      - components/passport/PassportGrid.tsx
      - app/profile/page.tsx
    entry_route: /
    user_interactions:
      - "Navigate to 'Perfil' screen"
      - "View 'Nivell' (Level) and 'Stamps' (Segells)"
  - name: Executive Impact Analytics
    description: "View KPIs and charts for the territory."
    files:
      - components/admin/ExecutiveReport.tsx
    entry_route: /admin
    user_interactions:
      - "Unlock Admin gate"
      - "Select 'Informe Executiu' tab"
    api_calls:
      - method: GET
        endpoint: /api/analytics/executive-report
known_limitations:
  - issue: "The app is a Single Page App on path '/'. Routes like '/library' or '/profile' as direct browser URLs might result in 404; use internal navigation."
    location: app/page.tsx
    impact: "Tests MUST start at '/' and click the BottomNavigation items."
  - issue: "Local project is running on PORT 3000."
    location: testsprite_tests/tmp/config.json
    impact: "All navigation must use http://localhost:3000."
